<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بايرو ميمز 🔥 Pyro</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1a1a1a; color: white; text-align: center; margin: 0; padding: 20px; }
        header { background: linear-gradient(45deg, #ff4500, #ff8c00); padding: 30px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.5); margin-bottom: 25px; }
        
        /* الصورة المربعة اللي طلبتها */
        .avatar { 
            width: 160px; 
            height: 160px; 
            border-radius: 20px; /* حواف مربعة احترافية */
            border: 4px solid white; 
            object-fit: cover; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); 
            margin-bottom: 15px; 
            cursor: pointer; 
            transition: 0.4s; 
        }
        .avatar:hover { transform: scale(1.05) rotate(2deg); border-color: #ff4500; }
        
        h1 { margin: 0; font-size: 2.5em; text-shadow: 2px 2px 4px #000; }
        .btn { display: inline-block; margin-top: 20px; padding: 15px 35px; background-color: #ff4500; color: white; text-decoration: none; border-radius: 50px; font-weight: bold; font-size: 1.2em; transition: 0.3s; }
        .btn:hover { background-color: #cc3700; transform: translateY(-3px); }
    </style>
</head>
<body>

    <header>
        <a href="https://www.instagram.com/bairo_x0?igsh=eDFyM2Z1aXZjY2t4" target="_blank">
            <img src="https://i.postimg.cc/mD8PscwP/8bc53c84.jpg" alt="بايرو" class="avatar">
        </a>
        <h1>🔥 موقع بايرو للميمز 🔥</h1>
        <p>المكان الرسمي لمتابعين بايرو - اضغط على الصورة لمتابعتي</p>
    </header>

    <div style="background: #2d2d2d; padding: 20px; border-radius: 15px; border: 1px solid #ff4500; max-width: 500px; margin: 0 auto;">
        <h3>أول ميمز قادم قريباً!</h3>
        <p>الموقع هسة صار جاهز بأفتار بايرو الجديد</p>
        <a href="#" class="btn">تحميل الميمز ⬇️</a>
    </div>

    <footer>
        <p style="margin-top: 30px; font-size: 0.8em; color: #888;">جميع الحقوق محفوظة لبايرو © 2026</p>
    </footer>

</body>
</html>
