<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بايرو ميمز 🔥 Pyro</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1a1a1a; color: white; text-align: center; margin: 0; padding: 20px; }
        header { background: linear-gradient(45deg, #ff4500, #ff8c00); padding: 30px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        h1 { margin: 0; font-size: 2.5em; text-shadow: 2px 2px 4px #000; }
        .meme-card { background: #2d2d2d; margin: 25px auto; padding: 20px; border-radius: 15px; max-width: 500px; border: 1px solid #ff4500; }
        img { width: 100%; border-radius: 10px; border: 2px solid #444; }
        .btn { display: inline-block; margin-top: 15px; padding: 12px 25px; background-color: #ff4500; color: white; text-decoration: none; border-radius: 50px; font-weight: bold; transition: 0.3s; }
        .btn:hover { background-color: #cc3700; transform: scale(1.05); }
        .upload-section { margin-top: 40px; padding: 20px; border-top: 2px dashed #444; }
    </style>
</head>
<body>

    <header>
        <h1>🔥 موقع بايرو للميمز 🔥</h1>
        <p>المكان الرسمي لمتابعين بايرو - استمتع واحفظ</p>
    </header>

    <div class="meme-card">
        <h3>ميمز رقم #1</h3>
        <img src="https://via.placeholder.com/500x350/ff4500/ffffff?text=Pyro+Meme+1" alt="Meme">
        <a href="#" class="btn">تحميل الميمز ⬇️</a>
    </div>

    <div class="upload-section">
        <h3>هل عندك ميمز قوي؟</h3>
        <p>ارفع الفيديو هسة (قيد التطوير)</p>
        <input type="file" accept="video/*" style="color: white;">
        <br>
        <button class="btn" onclick="alert('بايرو دا يشتغل على السيرفر هسة حتى يكدر يستلم فيديوهاتكم!')">رفع الفيديو 🚀</button>
    </div>

    <footer>
        <p>جميع الحقوق محفوظة لبايرو © 2026</p>
    </footer>

</body>
</html>
